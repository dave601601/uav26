services:
  uav-aruco:
    build:
      context: .
      dockerfile: Dockerfile
    image: uav-aruco:latest
    container_name: uav-aruco

    stdin_open: true
    tty: true

    volumes:
      - ./src:/workspace/src
      - ./build:/workspace/build
      - ./ros:/workspace/ros
      # GUI (Gazebo, rqt, rviz) via WSLg under DOCKER DESKTOP.
      # Absolute host paths in bind mounts resolve inside the
      # docker-desktop utility VM, NOT the user's WSL distro — mounting
      # /tmp/.X11-unix or /mnt/wslg grabs the VM's own (invisible)
      # Xwayland and gz renders into a ghost session: no window ever
      # appears. Symlinks under $HOME are resolved VM-side too.
      # Project-RELATIVE paths ARE bridged into the user distro, so we
      # mount a repo-local socket dir that scripts/x11_bridge.py (a
      # sudo-less userspace relay started by `scripts/dev.sh gui`)
      # populates with a proxied X0 for the real WSLg socket.
      - ./.x11-bridge:/tmp/.X11-unix

    working_dir: /workspace

    environment:
      - DISPLAY=${DISPLAY:-:0}
      - QT_X11_NO_MITSHM=1
      - XDG_RUNTIME_DIR=/tmp/runtime-root
      # DDS isolation. network_mode:host + default domain 0 lets any
      # ROS node on this machine (other containers, host tools,
      # orphaned nodes) discover and collide with the sim graph — all
      # load-bearing topics are absolute names (/fc/setpoint,
      # /uav26_quad/command/motor_speed). Pin a project domain and
      # keep DDS on localhost.
      - ROS_DOMAIN_ID=26
      - ROS_LOCALHOST_ONLY=1
      # NVIDIA GPU 쓸 거면
      - NVIDIA_VISIBLE_DEVICES=all
      - NVIDIA_DRIVER_CAPABILITIES=all

    network_mode: host
    privileged: true

    # GPU passthrough (NVIDIA Container Toolkit 깔려있어야 함)
    deploy:
      resources:
        reservations:
          devices:
            - driver: nvidia
              count: all
              capabilities: [gpu]

    command: /bin/bash