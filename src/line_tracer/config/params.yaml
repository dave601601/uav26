/line_tracer_node:
  ros__parameters:
    # ---- DR / control ----
    target_altitude: 2.0      # [m] cruise altitude during LINE_FOLLOW etc.
    kp_xy: 0.8                # P gain on body-x / body-y position offsets
    kp_yaw: 3.0               # P gain on heading error (raised from 1.0
                              # to tighten yaw-lock against firmware drift)
    kp_z: 0.6                 # P gain on altitude error
    max_vxy: 0.5              # [m/s] clamp on linear body velocity.
                              # 0.2 dated from the open-loop era when
                              # commanded velocity was really an
                              # acceleration and inertia built up
                              # unbounded (r34/r35 overshoots). With
                              # the body-velocity loop the drone
                              # tracks the commanded speed, and the
                              # camera footprint (~2.7 m at 2 m alt,
                              # 30 fps) still gets ~5 s of dwell per
                              # marker at 0.5 m/s. Full-arena sweep +
                              # retrieval tour needs the speed: the
                              # mission is ~250 m of legs.
    max_wz: 2.5               # [rad/s] clamp on yaw rate. Firmware
                              # caps yawrate_sp at 1 rad/s so values
                              # above that are clipped on its side, but
                              # the higher cap lets the lock saturate
                              # the firmware command instead of the
                              # algorithm command.
    dr_dt: 0.025              # [s] DR integration period (40 Hz; below
                              # fc_core's COMP_STALE_MS=200 with margin
                              # so setpoints never go stale at the FC.)
    external_override_ttl: 0.5  # [s] /line_tracer/pixel_error stale threshold
    publish_debug_image: true

    # ---- Perception (Canny + Hough) ----
    canny_low: 60
    canny_high: 180
    hough_threshold: 60
    hough_min_line_length: 40
    hough_max_line_gap: 20

    # ---- ArUco ----
    marker_size: 0.4          # [m] official sheet size; reserved for PnP
    # Rules give IDs 0..49 but no dictionary; 0..49 exactly matches the
    # 50-marker dictionaries -> 4X4_50 is the working assumption. Swap
    # here (and regenerate world textures via aruco.py --dict) the day
    # the rules confirm.
    aruco_dict: "4X4_50"

    # ---- Lookahead (sideways OV9281+6mm) ----
    lookahead_enable: true
    # Mount extrinsics — MUST mirror the lookahead <sensor> pose in
    # world/models/uav26_quad/model.sdf: yaw pi/2 (boresight +Y_body),
    # pitch 0.4538 (26 deg depression — centers the band between the
    # +3 m and +6 m rows of the official 3 m grid), 5 cm left / 3 cm down.
    lookahead_mount_yaw: 1.5707963267948966
    lookahead_mount_pitch: 0.4538
    lookahead_mount_tx: 0.0
    lookahead_mount_ty: 0.05
    lookahead_mount_tz: -0.03
    lookahead_vote_threshold: 3   # sightings on one node before candidate
    lookahead_max_range: 9.0      # [m] slant; band far edge is ~7.8 m
    lookahead_snap_max_err: 1.5   # [m] vote acceptance = half a 3 m cell
    candidate_wait_seconds: 4.0   # [s] hover on a voted node before drop
    goto_timeout: 60.0            # [s] GOTO_CANDIDATE stall guard
    sweep_row_step: 2             # fly every 2nd interior row (side cam
                                  # observes the skipped one); forced to
                                  # 1 when lookahead_enable is false

    # ---- Initial conditions ----
    default_altitude: 0.0
