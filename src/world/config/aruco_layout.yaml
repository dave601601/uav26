# ArUco marker layout — DEFAULT (seed 42); regenerated at every sim
# launch by marker_randomize.py, so treat this file as a sample.
#
# pose: [x, y, z, roll, pitch, yaw]  단위 m / rad
#   - x, y: 격자 교차점 좌표 (world ENU)
#   - z   : 마커 윗면 두께 절반 (0.001 = 1mm 두께 sheet 의 중심 높이)
#
# Official spec (2026-07 survey): 30x21 m grass arena (dims assumed
# until the rules confirm), 3 m cells, WHITE 10 cm satin lines,
# markers 0.4 m sheets (white bg / black code) on INTERIOR grid
# vertices, 4 unique IDs from 0..49. Dictionary is NOT specified by
# the rules — the sim assumes DICT_4X4_50 (see aruco.py --dict).

marker_size: 0.4
marker_thickness: 0.002
texture_dir: textures

markers:
  - id: 17
    pose: [21.0, 15.0, 0.001, 0.0, 0.0, 0.0]
  - id: 15
    pose: [6.0, 6.0, 0.001, 0.0, 0.0, 0.0]
  - id: 14
    pose: [3.0, 6.0, 0.001, 0.0, 0.0, 0.0]
  - id: 8
    pose: [24.0, 18.0, 0.001, 0.0, 0.0, 0.0]
