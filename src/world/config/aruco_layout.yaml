# ArUco 마커 배치 (DICT_6X6_250).
#
# pose: [x, y, z, roll, pitch, yaw]  단위 m / rad
#   - x, y: 격자 교차점 좌표 (world ENU)
#   - z   : 마커 윗면 두께 절반 (0.001 = 1mm 두께 plate 의 중심 높이)
#   - rpy : 보통 0 (바닥 위에 평평하게 놓임)
#
# 본 사양: 50×50 cm 정사각, 30×20 m 격자(셀 4m) 위 일부 교차점에 분포.
# 본 task 는 폐루프 검증용이므로 5~10 개 정도면 충분.

marker_size: 0.5         # 한 변 길이 [m]
marker_thickness: 0.002  # 두께 [m]
texture_dir: textures    # 패키지 share 기준 상대경로

markers:
  - id: 0
    pose: [4.0, 4.0, 0.001, 0.0, 0.0, 0.0]
